repos:
  - repo: local
    hooks:
      - id: unit-tests
        name: Run unit tests
        entry: task test
        language: system
        pass_filenames: false
      - id: lint
        name: Run linter
        entry: task lint
        language: system
        pass_filenames: false
      - id: build
        name: Run build
        entry: task snapshot
        language: system
        pass_filenames: false
