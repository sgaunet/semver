# Snapshot Build Workflow
# Tests release process on every push without publishing artifacts
# Validates GoReleaser config, Docker builds, and cross-compilation
# Catches release issues before tagging
# Docs: https://goreleaser.com

name: snapshot

on:
  push:
    # Run on every commit pushed to any branch ('**' also matches nested
    # branches like feature/foo). Tag pushes don't match a branches filter,
    # so they're excluded automatically and handled by release.yml.
    branches:
      - '**'

permissions:
  contents: read

jobs:
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for GoReleaser changelog

      - uses: jdx/mise-action@v3
        with:
          install: true # [default: true] run `mise install`
          cache: true # [default: true] cache mise using GitHub's cache
  
      - name: Create snapshot release
        shell: /usr/bin/bash {0}
        run: |
          task snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment if using GoReleaser Pro
          # GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
